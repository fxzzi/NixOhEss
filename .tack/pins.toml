# tack pins. edit by hand or with tack add / rm / alias
# nix reads pins.lock.json; this file drives tack update

# all_follow: input name -> top-level pin it follows wherever it appears
# opt out per-input with exclude_follow
[all_follow]
nixpkgs = "nixpkgs"
watt = "watt"

# auto-dedup (no top-level pin needed):
fenix = "fenix"
flake-parts = "flake-parts"
rust-analyzer-src = "rust-analyzer"

# [inputs.<name>] fields
#   url             required, shorturl ok; ?rev=<sha> pins an exact commit
#   type            flake (default), fetch, or fixed
#   flake           legacy false means type = "fetch"
#   follows         { child = "pin" } override map
#   exclude_follow  all_follow names to skip
#   dir             subdir holding flake.nix
#   submodules      fetch git submodules
#   unpack          fixed-only: tarball or file
[inputs.nixpkgs]
url = "github:NixOS/nixpkgs/nixos-unstable"

[inputs.azzipkgs]
url = "gitlab:fazzi/azzipkgs"
[inputs.evoctl-nix]
url = "gitlab:fazzi/evoctl-nix"
[inputs.nvuv]
url = "gitlab:fazzi/nvuv"
[inputs.creamlinux]
url = "github:fxzzi/creamlinux-installer"
[inputs.startpage]
url = "gitlab:fazzi/startpage"
type = "fetch"
[inputs.walls]
url = "gitlab:fazzi/walls"
type = "fetch"

[inputs.nixos-core]
url = "github:manic-systems/nixos-core/20b5f8916a3fde2f02bccd2e1f2795ab511aab5b"
[inputs.tack]
url = "github:manic-systems/tack"

[inputs.nvf]
url = "github:NotAShelf/nvf"
[inputs.rags]
url = "github:NotAShelf/rags"
[inputs.watt]
url = "github:NotAShelf/watt"
[inputs.stash]
url = "github:NotAShelf/stash"
[inputs.tuigreet]
url = "github:NotAShelf/tuigreet"

[inputs.hjem]
url = "github:feel-co/hjem"

[inputs.hyprland]
url = "github:hyprwm/Hyprland/847a54dfc13ce4fbf7a036973cbf4d3f0a2f7f04"

[inputs.agenix]
url = "github:ryantm/agenix"

[inputs.niqspkgs]
url = "github:diniamo/niqspkgs"

[inputs.nix-gaming]
url = "github:fufexan/nix-gaming"
